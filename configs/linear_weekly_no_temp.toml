train = true
training_runs = 0   # 0 = single run with fixed seed for reproducibility

[clustering]
run_clustering = true   # set to false to reuse existing assignments from results_path

[clustering.n_clusters_per_region]
NORTH     = 9
SOUTH     = 8
EAST      = 8
WEST      = 8
MONTEVIDEO = 10

[data]
window_size    = 336    # 24*7*2 (2 weeks)
horizon_type   = "hour"
horizon_length = 168    # 24*7 (1 week)
label_len      = 0
batch_size     = 128

[training]
patience       = 50
learning_rate  = 0.00003
train_epochs   = 3000

[model]
type            = "linear"
include_holiday = false
exog_cols       = []
use_temp_bins = false
learnable_bins  = false
